<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YuMark Renderer</title>
<script src="file:///android_asset/raw/markedjs.js"></script>
<link rel="stylesheet" href="file:///android_asset/raw/katexcss.css">
<script src="file:///android_asset/raw/katexjs.js"></script>
<script src="file:///android_asset/raw/katex-auto-render.js"></script>
<script defer src="file:///android_asset/raw/mermaidjs.js" onload="window.__mermaidLoaded && window.__mermaidLoaded()"></script>
<link rel="stylesheet" href="file:///android_asset/raw/prism.css">
<script src="file:///android_asset/raw/prism.js"></script>
<script>
// 配置marked
if (typeof marked !== 'undefined') {
    marked.setOptions({breaks: true, gfm: true});
}

// mermaid 延迟加载完成后，补渲染已存在的图表
window.__mermaidLoaded = function() {
    try {
        var contentEl = document.getElementById('content');
        if (contentEl && typeof mermaid !== 'undefined') {
            mermaid.run({nodes: contentEl.querySelectorAll('.language-mermaid')});
        }
    } catch(e) { console.log('mermaid late run: ' + e.message); }
};

// 立即定义renderMarkdown函数，不等待DOM
window.renderMarkdown = function(markdownText) {
    function log(msg) {
        console.log(msg);
    }

    try {
        if (typeof marked === 'undefined') {
            throw new Error('marked is undefined');
        }

        // 步骤1: 先保护代码区域，避免代码里的 $ 被当成公式
        const codeStore = [];
        let processedText = markdownText.replace(/```[\s\S]*?```|~~~[\s\S]*?~~~|``[^\n]*?``|`[^`\n]*`/g, function(match) {
            codeStore.push(match);
            return 'YUMARKCODE' + (codeStore.length - 1) + 'E';
        });

        // 步骤2: 保护数学公式（用占位符替换，避免 \\、_、& 等被Markdown解析）
        const mathBlocks = [];
        function stash(type, formula) {
            mathBlocks.push({type: type, formula: formula});
            return 'YUMARKMATH' + (mathBlocks.length - 1) + 'E';
        }

        // 块级公式 $$...$$（可跨行）
        processedText = processedText.replace(/\$\$([\s\S]+?)\$\$/g, function(m, f) {
            return stash('block', f);
        });
        // 块级公式 \[...\]
        processedText = processedText.replace(/\\\[([\s\S]+?)\\\]/g, function(m, f) {
            return stash('block', f);
        });
        // 行内公式 \(...\)
        processedText = processedText.replace(/\\\(([\s\S]+?)\\\)/g, function(m, f) {
            return stash('inline', f);
        });
        // 裸环境（不带 $$ 直接写 \begin{equation}...\end{equation} 等）
        processedText = processedText.replace(/\\begin\{(equation\*?|align\*?|alignat\*?|gather\*?|CD)\}[\s\S]+?\\end\{\1\}/g, function(m) {
            return stash('block', m);
        });
        // 行内公式 $...$（不跨行；首尾不能是空白；结尾 $ 后不能紧跟数字，避免 "$20 和 $30" 被误判）
        processedText = processedText.replace(/(^|[^\\$])\$((?:\\[^\n]|[^\\$\n])+?)\$(?!\d)/g, function(match, prefix, formula) {
            if (/^\s/.test(formula) || /\s$/.test(formula)) return match;
            return prefix + stash('inline', formula);
        });

        // 恢复代码区域，交给 marked 正常渲染
        processedText = processedText.replace(/YUMARKCODE(\d+)E/g, function(m, i) {
            return codeStore[+i];
        });

        log('Protected ' + mathBlocks.length + ' formulas');

        // 步骤3: Markdown渲染
        let html = marked.parse(processedText);

        // 步骤4: 用 KaTeX 直接把占位符渲染成HTML
        // 注意必须用替换函数，不能用替换字符串——公式里的 $ & 等在替换字符串中有特殊含义
        function looksDoubleEscaped(f) {
            // 反斜杠被双写的文档（常见于AI生成/JSON复制）：存在 \\命令，且不存在任何单反斜杠命令
            const hasDouble = /\\\\[a-zA-Z]/.test(f);
            const hasSingle = /(^|[^\\])\\(?!\\)[a-zA-Z]/.test(f);
            return hasDouble && !hasSingle;
        }
        function renderFormula(formula, display) {
            const opts = {displayMode: display, strict: 'ignore', output: 'html'};
            // 双写反斜杠的公式先归一化：\\theta -> \theta，\\\\ -> \\
            if (looksDoubleEscaped(formula)) {
                formula = formula.replace(/\\\\/g, '\\');
            }
            try {
                return katex.renderToString(formula, Object.assign({throwOnError: true}, opts));
            } catch(e1) {
                // 解析失败再试一次反斜杠减半（兜底混合写法）
                const halved = formula.replace(/\\\\/g, '\\');
                if (halved !== formula) {
                    try {
                        return katex.renderToString(halved, Object.assign({throwOnError: true}, opts));
                    } catch(e2) { /* 继续走错误展示 */ }
                }
                // 最终以红色源码展示原公式
                return katex.renderToString(formula, Object.assign({throwOnError: false}, opts));
            }
        }
        let failCount = 0;
        html = html.replace(/YUMARKMATH(\d+)E/g, function(match, i) {
            const item = mathBlocks[+i];
            if (!item) return match;
            try {
                // displayMode 必须正确传递：align/gather 等环境只能在块级模式渲染
                return renderFormula(item.formula, item.type === 'block');
            } catch(e) {
                failCount++;
                const esc = item.formula.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                return '<code class="math-error" title="' + (e.message || 'KaTeX error') + '">' + esc + '</code>';
            }
        });

        log('Rendered ' + mathBlocks.length + ' formulas, ' + failCount + ' failed');

        const contentEl = document.getElementById('content');
        if (contentEl) {
            contentEl.innerHTML = html;
            log('HTML set');

            // 兜底：扫描漏网的公式（如不常见的定界符写法），不含单个 $，避免误伤普通文本
            if (typeof renderMathInElement !== 'undefined') {
                try {
                    renderMathInElement(contentEl, {
                        delimiters: [
                            {left: '$$', right: '$$', display: true},
                            {left: '\\[', right: '\\]', display: true},
                            {left: '\\(', right: '\\)', display: false}
                        ],
                        throwOnError: false,
                        strict: 'ignore'
                    });
                } catch(e) {
                    log('KaTeX fallback error: ' + e.message);
                }
            }

            // Prism代码高亮
            if (typeof Prism !== 'undefined') {
                Prism.highlightAllUnder(contentEl);
            }

            // Mermaid图表
            if (typeof mermaid !== 'undefined') {
                mermaid.run({nodes: contentEl.querySelectorAll('.language-mermaid')});
            }

            // 大纲收集：给标题分配锚点 id 并回传 Android
            try {
                var headings = contentEl.querySelectorAll('h1,h2,h3,h4,h5,h6');
                var outline = [];
                for (var hi = 0; hi < headings.length; hi++) {
                    var h = headings[hi];
                    var hid = 'yumark-h-' + hi;
                    h.id = hid;
                    outline.push({
                        level: parseInt(h.tagName.substring(1), 10),
                        text: (h.textContent || '').trim(),
                        id: hid
                    });
                }
                if (window.Android && Android.onOutline) {
                    Android.onOutline(JSON.stringify(outline));
                }
            } catch(e) {
                log('Outline error: ' + e.message);
            }
        }

        return true;
    } catch(e) {
        log('ERROR: ' + e.message);
        console.error('Full error:', e);
        const contentEl = document.getElementById('content');
        if (contentEl) {
            contentEl.innerHTML = '<h3 style="color:red;">Error: ' + e.message + '</h3>';
        }
        return false;
    }
};

window.scrollToHeading = function(id) {
    var el = document.getElementById(id);
    if (el) {
        el.scrollIntoView({behavior: 'smooth', block: 'start'});
    }
};

console.log('renderMarkdown function defined');
</script>
<style id="theme-styles"></style>
<style>
body{margin:0;padding:16px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;word-wrap:break-word;background:#fff;}
#content{max-width:100%;min-height:100vh;}
img{max-width:100%;height:auto;cursor:pointer;border-radius:4px;}
a{color:#0066cc;text-decoration:none;} a:active{opacity:0.7;}
table{border-collapse:collapse;width:100%;margin:16px 0;}
th,td{border:1px solid #ddd;padding:8px;text-align:left;}
th{background-color:#f5f5f5;font-weight:600;}
code{font-family:'Courier New',monospace;background-color:#f5f5f5;padding:2px 6px;border-radius:3px;}
pre{background-color:#f5f5f5;padding:16px;border-radius:6px;overflow-x:auto;}
blockquote{border-left:4px solid #ddd;padding-left:16px;color:#666;}
.katex{font-size:1.1em;}
.katex-display{overflow-x:auto;overflow-y:hidden;padding:8px 0;margin:12px 0;}
.katex-display::-webkit-scrollbar{height:3px;}
code.math-error{color:#cc0000;background:#fff0f0;}
</style>
</head>
<body>
<div id="content">Loading...</div>
<script>
// 渲染管线就绪握手（marked/katex/prism 已同步加载；mermaid 延迟加载，渲染函数内有 typeof 守卫）
if (window.Android && Android.onReady) { Android.onReady(); }
</script>
</body>
</html>
